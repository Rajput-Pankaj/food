name: Deploy

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain for Traefik SSL (optional)'
        required: false
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix server

      - name: Verify before deploy
        run: npm run verify

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "Set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, and DEPLOY_PATH in repo secrets."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only
            npm ci
            npm ci --prefix server
            npm run verify
            DOMAIN="${{ inputs.domain || secrets.DOMAIN }}" ./scripts/deploy.sh
