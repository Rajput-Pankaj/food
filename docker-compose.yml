# FoodExpress production stack
# Run: ./scripts/deploy.sh  (auto-generates .env, network, optional Traefik SSL)

services:
  db:
    image: postgres:16-alpine
    container_name: foodexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - foodexpress_net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: foodexpress-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-false}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-noreply@foodexpress.com}
      APP_URL: ${APP_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/uploads
      DEPLOY_ENV_PATH: /app/deploy/.env
      ENABLE_SETUP_ENV_WRITE: ${ENABLE_SETUP_ENV_WRITE:-true}
      TRAEFIK_AVAILABLE: ${TRAEFIK_AVAILABLE:-false}
      APP_PORT: ${APP_PORT:-8080}
      DOMAIN: ${DOMAIN:-}
    volumes:
      - media_uploads:/app/uploads
      - ./.env:/app/deploy/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - foodexpress_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: foodexpress-web
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'test -f /usr/share/nginx/html/index.html']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - foodexpress_net

volumes:
  postgres_data:
    name: foodexpress_postgres_data
  media_uploads:
    name: foodexpress_media_uploads

networks:
  foodexpress_net:
    name: foodexpress_net
    driver: bridge
