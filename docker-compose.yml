services:
  db:
    image: postgres:16-alpine
    container_name: foodexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodexpress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodexpress}
      POSTGRES_DB: ${POSTGRES_DB:-foodexpress}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-foodexpress} -d ${POSTGRES_DB:-foodexpress}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - foodexpress

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: foodexpress-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-foodexpress}:${POSTGRES_PASSWORD:-foodexpress}@db:5432/${POSTGRES_DB:-foodexpress}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - foodexpress

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: foodexpress-web
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      - api
    networks:
      - foodexpress

volumes:
  postgres_data:

networks:
  foodexpress:
    driver: bridge
