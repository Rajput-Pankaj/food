<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FoodExpress — order delicious food online with fast delivery in Kanpur. Browse menu, add to cart, and checkout easily."
    />
    <meta name="theme-color" content="#16a34a" id="theme-color-meta" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>FoodExpress | Food Delivery</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem('foodexpress_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            var meta = document.getElementById('theme-color-meta');
            if (meta) meta.setAttribute('content', '#030712');
          }
        } catch (e) {}
      })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E60XQ8JBZZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E60XQ8JBZZ');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
