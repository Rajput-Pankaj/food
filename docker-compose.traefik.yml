# Traefik overlay — used when DOMAIN is set and Traefik is detected
# Auto-applied by scripts/deploy.sh

services:
  web:
    networks:
      - foodexpress_net
      - traefik_public
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.foodexpress.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.foodexpress.entrypoints=websecure
      - traefik.http.routers.foodexpress.tls=true
      - traefik.http.routers.foodexpress.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.foodexpress.loadbalancer.server.port=80
      # HTTP → HTTPS redirect
      - traefik.http.routers.foodexpress-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.foodexpress-http.entrypoints=web
      - traefik.http.routers.foodexpress-http.middlewares=foodexpress-redirect
      - traefik.http.middlewares.foodexpress-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.foodexpress-redirect.redirectscheme.permanent=true

networks:
  traefik_public:
    name: ${TRAEFIK_NETWORK:-traefik}
    external: true
