# Development stack with hot-reload API + Vite frontend
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodexpress
      POSTGRES_PASSWORD: foodexpress
      POSTGRES_DB: foodexpress
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foodexpress']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./server:/app
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgres://foodexpress:foodexpress@db:5432/foodexpress
      JWT_SECRET: dev-secret-change-me-for-local-testing-only
      CORS_ORIGIN: http://localhost:5180
      SEED_DEMO_USERS: 'true'
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_dev:
